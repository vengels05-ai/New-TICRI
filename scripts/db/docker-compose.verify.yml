services:
  postgres:
    image: postgres:16-alpine
    container_name: ticri-congress-verify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticri_verify
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticri_verify"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
